<!-- templates/signup.html -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - AI Digital Twin BI System</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<script>
tailwind.config = {
    darkMode: 'class',
    theme: {
        extend: {
            animation: {
                'float': 'float 6s ease-in-out infinite',
                'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
                float: {
                    '0%,100%': { transform: 'translateY(0px)' },
                    '50%': { transform: 'translateY(-10px)' }
                },
                glow: {
                    '0%': { boxShadow: '0 0 20px rgba(99,102,241,0.3)' },
                    '100%': { boxShadow: '0 0 40px rgba(99,102,241,0.6)' }
                }
            }
        }
    }
}
</script>

<style>
.glassmorphism{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(25px);
border:1px solid rgba(255,255,255,0.1);
}

.gradient-border{
background:linear-gradient(45deg,transparent 30%,rgba(99,102,241,0.3) 50%,transparent 70%);
background-clip:padding-box;
border:2px solid transparent;
}
</style>

</head>

<body class="bg-gradient-to-br from-gray-900 via-indigo-950 to-black min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">

<!-- Branding -->
<div class="text-center mb-12">
<div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-3xl shadow-2xl mx-auto mb-6 animate-glow">
<i class="fas fa-user-plus text-2xl text-white"></i>
</div>

<h1 class="text-4xl font-black text-white mb-2">
Create Account
</h1>

<p class="text-indigo-400 text-xl font-semibold">
Join Digital Twin BI
</p>
</div>

<!-- Signup Card -->
<div class="glassmorphism rounded-3xl p-10 shadow-2xl gradient-border">

<form class="space-y-6">

<div>
<input type="text" placeholder="Full Name"
class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-gray-400 focus:outline-none">
</div>

<div>
<input type="email" placeholder="Email Address"
class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-gray-400 focus:outline-none">
</div>

<div>
<input type="password" placeholder="Password"
class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-gray-400 focus:outline-none">
</div>

<button class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-xl font-bold py-4 rounded-2xl">
Create Account
</button>

</form>

<p class="text-center mt-6 text-gray-400">
Already have an account?
<a href="/login" class="text-indigo-400 font-semibold">Login</a>
</p>

</div>

</div>

</body>

</html>
